<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cổng bác sĩ{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="background:#f8fafc;">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Cổng bác sĩ</h2>
                <div class="text-secondary small">Xem lịch làm việc và bệnh nhân đã xác nhận</div>
            </div>
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'accounts:logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger rounded-pill px-4">Đăng xuất</button>
            </form>
            {% endif %}
        </div>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
