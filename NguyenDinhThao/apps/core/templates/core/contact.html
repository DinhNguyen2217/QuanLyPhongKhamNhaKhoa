{% extends 'base.html' %}
{% block title %}Liên hệ{% endblock %}
{% block content %}
<div class="row g-4 align-items-stretch">
    <div class="col-lg-5">
        <div class="card p-4 h-100">
            <h2 class="section-title mb-3">Nha Khoa Nụ Cười</h2>
            <ul class="list-unstyled footer-list mb-0">
                <li><i class="bi bi-telephone"></i> Hotline: 0900 000 000</li>
                <li><i class="bi bi-envelope"></i> Email: clinic@example.com</li>
                <li><i class="bi bi-geo-alt"></i> 566 Núi Thành, Hoà Cường Nam, Hòa Cường, Đà Nẵng, Việt Nam</li>
                <li><i class="bi bi-clock"></i> Giờ làm việc: 08:00 - 20:00</li>
            </ul>
        </div>
    </div>
    <div class="col-lg-7">
    <div class="card p-0 h-100 overflow-hidden">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3834.6410098331603!2d108.21948517459933!3d16.03219264042934!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x314219ee598df9c5%3A0xaadb53409be7c909!2zVHLGsOG7nW5nIMSQ4bqhaSBo4buNYyBLaeG6v24gdHLDumMgxJDDoCBO4bq1bmc!5e0!3m2!1svi!2s!4v1776340862054!5m2!1svi!2s"
            width="100%"
            height="100%"
            style="border:0; min-height: 420px;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
</div>
</div>
{% endblock %}
